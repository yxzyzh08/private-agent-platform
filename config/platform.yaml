platform:
  name: "My Agent Platform"
  owner_telegram_id: "YOUR_TELEGRAM_ID"

models:
  default: claude-sonnet-4-6
  fallback:
    - gpt-4o
    - qwen-plus

security:
  dm_policy: pairing
  allowed_users: []
  rate_limit_per_minute: 10

storage:
  vector_db: chroma
  vector_db_path: ./data/chroma
  session_db: ./data/sessions

logging:
  level: INFO
  format: text
  # file: ./data/logs/platform.log

channels:
  plugins: []

dispatch:
  routes:
    - channel: cui
      agent: dev_bot
    - channel: github_webhook
      agent: dev_bot
    - channel: telegram
      agent: cs_bot

cli:
  backend: "subprocess"  # "subprocess" (claude_code_cli) or "sdk" (claude_code_sdk)

session_rotation:
  context_threshold: 0.80
  max_rotations: 3
  summary_max_tokens: 2000

task_planning:
  max_subtasks: 10                # 单次分解最大子任务数
  max_attempts_per_task: 2        # 单个子任务最大重试次数
  subtask_timeout_seconds: 900    # 子任务超时 15 分钟
  plan_timeout_seconds: 9000      # 整个需求超时 2.5 小时
  default_max_turns: 150          # 子任务默认 max_turns
  summary_max_tokens: 1500        # 结果摘要长度限制
  consecutive_failure_limit: 2    # 连续失败自动终止阈值
  auto_pr: true                   # 全部完成后自动创建 PR
  sensitive_patterns:             # 敏感文件模式（fnmatch 匹配 basename）
    - ".env*"
    - "*credential*"
    - "*.secret"
    - "*.key"
    - "*.pem"

cui:
  host: "0.0.0.0"
  port: 3001
  working_directory: "."
